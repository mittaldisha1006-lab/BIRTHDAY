<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Make a Wish — Naman</title>

<link rel="stylesheet" href="styles.css" />
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:Poppins,sans-serif;
    background:#0f0f1a;
    color:white;
    overflow-x:hidden;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
}

.countdown{text-align:center;}
.countdown h1{font-size:clamp(2rem,5vw,3.5rem);margin:10px 0;}

.small{color:#d8cfc0}

.time-grid{
    display:flex;
    gap:14px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:18px;
}

.time-cell{
    background:rgba(255,255,255,0.08);
    padding:16px 20px;
    border-radius:14px;
    min-width:80px;
    backdrop-filter:blur(6px);
}

.time-cell strong{
    display:block;
    font-size:1.6rem;
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
}

.hero-button{
    padding:10px 16px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.vibrant{
    background:linear-gradient(45deg,#ff4d6d,#ffb703);
    color:white;
}

.candle{
    width:40px;
    height:90px;
    background:white;
    border-radius:6px;
    position:relative;
}

.flame{
    width:14px;
    height:14px;
    background:orange;
    border-radius:50%;
    position:absolute;
    top:-18px;
    left:50%;
    transform:translateX(-50%);
    box-shadow:0 0 20px orange;
    animation:flicker 1s infinite alternate;
}

@keyframes flicker{
    from{transform:translateX(-50%) scale(1);}
    to{transform:translateX(-50%) scale(1.2);}
}

.flame.blow{
    animation:blow 0.8s forwards;
}

@keyframes blow{
    0%{opacity:1;transform:translateX(-50%) scale(1);}
    100%{opacity:0;transform:translateX(50px) scale(0);}
}

/* confetti */
.confetti{
    position:fixed;
    width:8px;
    height:8px;
    top:-10px;
    animation:fall linear forwards;
    z-index:999;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}
</style>
</head>

<body>

<main class="page-container">

<header>
<nav>
    <a href="page1.html">Enter Site</a>
    <a href="special-message.html">Message</a>
    <a href="birthday-story.html">Story</a>
    <a href="gallery.html">Photos</a>
    <a href="music.html">Song</a>
    <a href="quiz.html">Quiz</a>
    <a href="celebrate.html">Celebrate</a>
    <a href="wish.html">Wish Wall</a>
</nav>
</header>

<section class="hero card countdown">

<h1 class="handwritten">Countdown to Naman’s Birthday 🎉</h1>
<p class="small">Set the date, wait for magic, then blow the candle ✨</p>

<div style="max-width:560px;margin:18px auto;display:grid;gap:10px;">
<input id="target-date" type="datetime-local" style="padding:12px;border-radius:10px;" />

<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
<button id="save-date" class="hero-button">Save Date</button>
<button id="skip-date" class="hero-button">Skip</button>
</div>
</div>

<div class="time-grid">
<div class="time-cell"><strong id="days">--</strong><div class="small">Days</div></div>
<div class="time-cell"><strong id="hours">--</strong><div class="small">Hours</div></div>
<div class="time-cell"><strong id="minutes">--</strong><div class="small">Minutes</div></div>
<div class="time-cell"><strong id="seconds">--</strong><div class="small">Seconds</div></div>
</div>

<div style="margin-top:25px;display:flex;gap:20px;justify-content:center;align-items:center;flex-wrap:wrap;">
<div class="candle">
<div class="flame" id="start-flame"></div>
</div>

<button id="blow-start" class="hero-button vibrant" disabled>
Blow Candle & Enter 🎂
</button>
</div>

</section>

</main>

<script>

const dateInput = document.getElementById('target-date');
const saveBtn = document.getElementById('save-date');
const skipBtn = document.getElementById('skip-date');
const blowBtn = document.getElementById('blow-start');
const flame = document.getElementById('start-flame');

let target = localStorage.getItem('targetDate');

if(target){
    dateInput.value = target;
    startTimer();
}else{
    setZero();
}

saveBtn.addEventListener('click',()=>{
    if(!dateInput.value){
        alert("Choose date first");
        return;
    }
    localStorage.setItem('targetDate',dateInput.value);
    target = dateInput.value;
    startTimer();
    alert("Countdown started for Naman 🎉");
});

skipBtn.addEventListener('click',()=>{
    localStorage.removeItem('targetDate');
    window.location.href='page1.html';
});

function setZero(){
    document.getElementById('days').textContent="00";
    document.getElementById('hours').textContent="00";
    document.getElementById('minutes').textContent="00";
    document.getElementById('seconds').textContent="00";
}

function updateClock(){
    if(!target) return;

    const now = new Date();
    const t = new Date(target);
    const diff = t - now;

    if(diff<=0){
        setZero();
        blowBtn.disabled=false;
        triggerConfetti();
        return;
    }

    const d=Math.floor(diff/(1000*60*60*24));
    const h=Math.floor((diff/(1000*60*60))%24);
    const m=Math.floor((diff/60000)%60);
    const s=Math.floor((diff/1000)%60);

    document.getElementById('days').textContent=String(d).padStart(2,'0');
    document.getElementById('hours').textContent=String(h).padStart(2,'0');
    document.getElementById('minutes').textContent=String(m).padStart(2,'0');
    document.getElementById('seconds').textContent=String(s).padStart(2,'0');
}

function startTimer(){
    if(window.timer) clearInterval(window.timer);
    updateClock();
    window.timer=setInterval(updateClock,1000);
}

function triggerConfetti(){
    for(let i=0;i<60;i++){
        const c=document.createElement("div");
        c.classList.add("confetti");
        c.style.left=Math.random()*100+"vw";
        c.style.background=["#ff4d6d","#ffd166","#06d6a0","#4cc9f0"][Math.floor(Math.random()*4)];
        c.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(c);

        setTimeout(()=>c.remove(),5000);
    }
}

blowBtn.addEventListener('click',()=>{
    flame.classList.add('blow');

    triggerConfetti();

    setTimeout(()=>{
        window.location.href='page1.html';
    },1200);
});

</script>

</body>
</html>
