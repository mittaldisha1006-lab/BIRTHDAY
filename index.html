<!DOCTYPE html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Make a Wish — Naman</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .countdown { text-align:center; }
        .countdown h1 { font-size: clamp(2.2rem, 5vw, 4rem); margin: 8px 0; }
        .time-grid { display:flex; gap:18px; justify-content:center; margin-top:18px; }
        .time-cell { background: rgba(255,255,255,0.06); padding:18px 22px; border-radius:14px; min-width:80px; }
        .time-cell strong { display:block; font-size:1.8rem; color:#fff; }
        .small { color:#e6dbc8; margin-top:8px; }
    </style>
</head>
<body>
    <main class="page-container">
        <header>
            <nav>
                <a href="page1.html">Enter Site</a>
                <a href="special-message.html">Message</a>
                <a href="birthday-story.html">Story</a>
                <a href="gallery.html">Photos</a>
                <a href="music.html">Song</a>
                <a href="quiz.html">Quiz</a>
                <a href="celebrate.html">Celebrate</a>
                <a href="wish.html">Wish Wall</a>
            </nav>
        </header>

        <section class="hero card countdown">
            <h1 class="handwritten">Make a Wish for Naman</h1>
            <p class="small">Set the date, wait for the countdown, then blow the candle to enter the site.</p>

            <div style="max-width:560px;margin:18px auto;display:grid;gap:10px;">
                <input id="target-date" type="datetime-local" style="padding:12px;border-radius:10px;" />
                <div style="display:flex;gap:10px;justify-content:center;">
                    <button id="save-date" class="hero-button">Save Date</button>
                    <button id="skip-date" class="hero-button hero-button-secondary">Skip / Start Now</button>
                </div>
            </div>

            <div id="timer" style="margin-top:12px;">
                <div class="time-grid">
                    <div class="time-cell"><strong id="days">--</strong><div class="small">Days</div></div>
                    <div class="time-cell"><strong id="hours">--</strong><div class="small">Hours</div></div>
                    <div class="time-cell"><strong id="minutes">--</strong><div class="small">Minutes</div></div>
                    <div class="time-cell"><strong id="seconds">--</strong><div class="small">Seconds</div></div>
                </div>
            </div>

            <div style="margin-top:22px;display:flex;gap:20px;align-items:center;justify-content:center;flex-wrap:wrap;">
                <div class="candle" id="start-candle">
                    <div class="flame" id="start-flame"></div>
                </div>
                <button id="blow-start" class="tab-btn vibrant">Blow Candle & Enter</button>
            </div>
        </section>
    </main>

    <script>
        // date storage
        const dateInput = document.getElementById('target-date');
        const saveBtn = document.getElementById('save-date');
        const skipBtn = document.getElementById('skip-date');
        const blowBtn = document.getElementById('blow-start');
        const flame = document.getElementById('start-flame');

        let target = localStorage.getItem('targetDate');
        if(target) dateInput.value = target;

        saveBtn.addEventListener('click', ()=>{
            if(!dateInput.value){ alert('Choose a date and time first'); return; }
            localStorage.setItem('targetDate', dateInput.value);
            target = dateInput.value; startTimer();
            alert('Date saved. Countdown started.');
        });

        skipBtn.addEventListener('click', ()=>{ localStorage.removeItem('targetDate'); window.location.href='page1.html'; });

        function updateClock(){
            const now = new Date();
            const t = target ? new Date(target) : now;
            const diff = Math.max(0, t - now);
            const d = Math.floor(diff / (1000*60*60*24));
            const h = Math.floor((diff/(1000*60*60))%24);
            const m = Math.floor((diff/60000)%60);
            const s = Math.floor((diff/1000)%60);
            document.getElementById('days').textContent = String(d).padStart(2,'0');
            document.getElementById('hours').textContent = String(h).padStart(2,'0');
            document.getElementById('minutes').textContent = String(m).padStart(2,'0');
            document.getElementById('seconds').textContent = String(s).padStart(2,'0');

            if(diff<=0){
                // enable blow
                blowBtn.disabled = false; blowBtn.classList.add('vibrant');
            }
        }

        function startTimer(){
            if(!target) return;
            updateClock();
            window._countdown = setInterval(updateClock,1000);
        }

        // initialize
        if(target) startTimer(); else { document.getElementById('days').textContent='--'; blowBtn.disabled=false; }

        // Blow action: animate and then go to page1
        blowBtn.addEventListener('click', ()=>{
            flame.classList.add('blow');
            setTimeout(()=>{ window.location.href='page1.html'; }, 900);
        });
    </script>
</body>
</html>
